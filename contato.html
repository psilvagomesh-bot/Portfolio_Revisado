<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>

<body>

    <header class="topo">
        <!-- Botão para mobile -->
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="menu" id="mainMenu">
            <a class="link" href="index.html">Início</a>
            <a class="link" href="projetos.html">Meus Projetos</a>
            <a class="link" href="contato.html">Contato</a>
        </nav>
    </header>

    <section class="contato">
        <h2>Entre em Contato</h2>

        <!-- Início do Formulário -->
        <form>

            <!-- Campo Nome -->
            <div class="campo-form">
                <label class="caixa-label" for="Nome">Nome</label>
                <input type="text" id="Nome" placeholder="Digite seu nome" required class="caixa-nome">
            </div>

            <!-- Campo E-mail -->
            <div class="campo-form">
                <label class="caixa-label" for="Email">E-mail</label>
                <input type="email" id="Email" placeholder="Digite seu E-mail" required class="caixa-nome">
            </div>

            <!-- Campo Mensagem -->
            <div class="campo-form">
                <label class="caixa-label" for="Mensagem">Mensagem</label>
                <!-- CORRIGIDO: "row" → "rows" -->
                <textarea id="Mensagem" rows="6" class="caixa-nome"></textarea>
            </div>

            <!-- Botão Enviar -->
            <button type="submit" class="botao-form" id="btn-mensagem">Enviar Mensagem</button>

        </form>
    </section>

    <footer class="rodape">
        <div class="rodape-conteudo">
            <p class="rodape-copy">© 2026. Todos os direitos reservados.</p>
            <p><a href="contato.html">Entre em contato</a></p>
            <p>
                <a href="https://jigsaw.w3.org/css-validator/check/referer">
                    <img class="selo-css"
                        src="https://jigsaw.w3.org/css-validator/images/vcss"
                        alt="CSS válido!">
                </a>
            </p>
        </div>
    </footer>

    <script src="js/script.js"></script>

</body>

</html>
